name: builder dispatcher
on:
  workflow_dispatch:                    # permite execução manual (UI)
    inputs:
      os:
        description: "Escolha o SO para build (fedora|ubuntu|arch)"
        required: true
        default: ubuntu

jobs:
  dispatch-to-fedora:
    uses: ./.github/workflows/fedora-builder.yml
    with:
      _cpusched: ${{ inputs._cpusched }}
    if: ${{ inputs.os == 'fedora' }}

  dispatch-to-ubuntu:
    uses: ./.github/workflows/ubuntu-builder.yml
    with:
      _cpusched: ${{ inputs._cpusched }}
    if: ${{ inputs.os == 'ubuntu' }}

  dispatch-to-arch:
    uses: ./.github/workflows/arch-builder.yml
    with:
      _cpusched: ${{ inputs._cpusched }}
    if: ${{ inputs.os == 'arch' }}
